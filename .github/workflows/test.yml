name: Tests

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

jobs:
  pytest:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.10", "3.11"]
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip
      - name: Install system deps
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            build-essential zlib1g-dev libbz2-dev liblzma-dev \
            libcurl4-openssl-dev libssl-dev
      - name: Install Python deps
        run: |
          python -m pip install --upgrade pip
          # cyvcf2 is slow to compile; skip in CI by using pysam fallback
          python -m pip install -e ".[test]" || python -m pip install -e ".[test]" --no-deps
          python -m pip install pytest pytest-mock pandas pyarrow flask pyyaml jinja2 \
            google-cloud-bigquery google-cloud-storage requests
      - name: Run pytest
        env:
          PYTHONPATH: .
        run: |
          pytest tests/ --tb=short
